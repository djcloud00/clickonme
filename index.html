<!DOCTYPE html>
<html>
<head>
<title>Birthday Magic</title>

<style>

body{
margin:0;
overflow-y:auto;
background:#0b0c1c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Georgia,serif;
color:white;
flex-direction:column;
}
  #heart{
font-size:90px;
cursor:pointer;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #ff0033;
}
to{
text-shadow:0 0 40px #ff0033,0 0 60px #ff0033;
}
}
  #message{
display:none;
font-size:28px;
overflow-y:auto;
whitespace:pre-line;
max-width:600px;
text-align:center;
line-height:1.6;
}

/* floating hearts */

.heart{
position:absolute;
font-size:25px;
animation:floatUp 5s linear forwards;
}
  @keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-800px);
opacity:0;
}
}

</style>
</head>

<body>
  <div id="heart" onclick="startMagic()">❤️</div>

<div id="message"></div>

<script>

const text=`I wonder...
How strange and beautiful 
to think about someone like
YOU ,so precious 😘
came into my life so quietly. 
What started as a small moment turned 
into memories, feelings, and a bond 
I never knew I needed. 🥰

Back in 12th & even in 11th
we felt something💖
we didn't say it
we didn't act on it
we just...carried it quietly.
And somehow life brought us back
You brought us back🫵
Like it was waiting for the right time
I've never been drawn to someone the way
I'm drawn to you🫠
Not just attraction 
But something deeper✨
Something that feels like fate.💍
MY DESTINY 🫀
MY FIRST LOVE♾️
You were never loud about your feelings
But you were always there🤗
Always understanding🫶
Always choosing me in the quietest way🥹
It feels like destiny didn't rush us
It just made sure we found eachother 
at the right time
You were worth the wait💕
And THANK YOU for being the love that was meant for ME💖`;

let i=0;
  function startMagic(){

document.getElementById("heart").style.display="none";
document.getElementById("message").style.display="block";

typeWriter();

}

function typeWriter(){

if(i < text.length){

document.getElementById("message").innerHTML += text.charAt(i);

i++;

/* AUTO SCROLL */
document.getElementById("message").scrollTop =
document.getElementById("message").scrollHeight;

setTimeout(typeWriter, 80);

}
else{

startHearts();

}

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerText=["💗","💖","💞","💕"][Math.floor(Math.random()*4)];
  heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

},250);

}

</script>
</body>
</html>
